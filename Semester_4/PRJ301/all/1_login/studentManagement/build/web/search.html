<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Search Students</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="card">
            <h2>Search Student Database</h2>
            <div class="form-group" style="display: flex; gap: 10px;">
                <input type="text" placeholder="Enter Student ID or Name...">
                <button style="width: 120px;">Search</button>
            </div>

            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Name</th>
                        <th>Course</th>
                        <th>Status</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td>STU001</td>
                        <td>John Doe</td>
                        <td>Computer Science</td>
                        <td style="color: green;">Active</td>
                    </tr>
                    <tr>
                        <td>STU002</td>
                        <td>Jane Smith</td>
                        <td>Business</td>
                        <td style="color: green;">Active</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</body>
</html>
