<!DOCTYPE html>
<html>
    <head>
        <title>Register - Datto</title>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <style>
            body {
                font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
                background-color: #f0f2f5;
                display: flex;
                justify-content: center;
                align-items: center;
                height: 100vh;
                margin: 0;
            }
            form {
                background-color: white;
                padding: 30px;
                border-radius: 8px;
                box-shadow: 0 4px 8px rgba(0,0,0,0.1);
                width: 300px;
                text-align: center;
            }
            h1 { color: #333; margin-bottom: 20px; }
            input[type="text"], input[type="password"] {
                width: 90%;
                padding: 10px;
                margin: 10px 0;
                border: 1px solid #ccc;
                border-radius: 4px;
            }
            input[type="submit"], input[type="reset"] {
                background-color: #007bff;
                color: white;
                padding: 10px 20px;
                border: none;
                border-radius: 4px;
                cursor: pointer;
                margin: 5px;
            }
            input[type="submit"]:hover { background-color: #0056b3; }
            input[type="reset"] { background-color: #6c757d; }
        </style>
    </head>
    <body>
        <form action="register" method="POST">
            <h1>Register</h1>
            <input type="text" placeholder="Username" name="txtUsername" required/>
            <input type="text" placeholder="Full Name" name="txtFullName" required/>
            <input type="password" placeholder="Password" name="txtPassword" required/>
            <br/>
            <input type="submit" value="Register" name="btnAction" />
            <input type="reset" value="Reset" />
        </form>
    </body>
</html>
